<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate Roast Machine 😂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', Gadget, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #111, #333);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        /* Intense screen shake animation */
        @keyframes intense-shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-2deg); }
            20% { transform: translate(-3px, 0px) rotate(3deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(2deg); }
            50% { transform: translate(-1px, 2px) rotate(-3deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-2deg); }
            80% { transform: translate(-1px, -1px) rotate(4deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 450px;
            width: 90%;
            z-index: 10;
        }

        h2 {
            color: #fff;
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: normal;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .input-group {
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 18px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
        }

        input[type="text"]:focus {
            border-color: #ff3333;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.6);
        }

        button {
            background: linear-gradient(45deg, #ff0055, #ff5500);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 0, 85, 0.4);
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 0, 85, 0.7);
        }

        /* The dynamic roast text style */
        .roast-text {
            font-size: 42px;
            font-weight: 900;
            color: #fff;
            line-height: 1.2;
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
            display: none;
            text-transform: uppercase;
            word-wrap: break-word;
        }

        .name-highlight {
            color: #ffea00;
            display: block;
            font-size: 50px;
            margin-top: 10px;
            text-shadow: 0 0 20px rgba(255, 234, 0, 0.6);
        }

        .emoji-rain {
            position: absolute;
            font-size: 30px;
            animation: fall 2.5s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Targetted the exact .mp3.mp3 name you have -->
    <audio id="roastSound" src="roast.mp3.mp3" preload="auto"></audio>

    <div class="container" id="mainCard">
        <!-- Input Section -->
        <div id="inputSection">
            <h2>Enter your name to see magic ✨</h2>
            <div class="input-group">
                <input type="text" id="userName" placeholder="Your Name..." autocomplete="off">
            </div>
            <button onclick="revealRoast()">Submit</button>
        </div>

        <!-- Roast Section -->
        <div id="roastSection" class="roast-text"></div>
    </div>

    <script>
        function revealRoast() {
            const nameInput = document.getElementById('userName').value.trim();
            const mainCard = document.getElementById('mainCard');
            const inputSection = document.getElementById('inputSection');
            const roastSection = document.getElementById('roastSection');
            const sound = document.getElementById('roastSound');
            
            if (nameInput === "") {
                alert("Abay naam to likh pehle! 😂");
                return;
            }

            // Play the roast sound instantly
            sound.play().catch(error => {
                console.log("Audio play blocked by browser settings:", error);
            });

            // 1. Full Red-Black Danger Background
            document.body.style.background = "linear-gradient(135deg, #0f0000, #4a0000, #000000)";
            
            // 2. Shake the whole card intensely
            mainCard.style.animation = "intense-shake 0.15s infinite";
            
            // 3. Hide Input
            inputSection.style.display = "none";
            
            // 4. Exact dynamic message layout
            roastSection.innerHTML = `FUCK YOU <span class="name-highlight">${nameInput}</span>`;
            roastSection.style.display = "block";

            // 5. Blast of middle finger and laughing emojis
            for (let i = 0; i < 40; i++) {
                setTimeout(createEmoji, i * 50);
            }
        }

        function createEmoji() {
            const emojis = ['🖕', '😂', '💀', '🔥', '🖕'];
            const emoji = document.createElement('div');
            emoji.classList.add('emoji-rain');
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + 'vw';
            emoji.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
            document.body.appendChild(emoji);

            setTimeout(() => {
                emoji.remove();
            }, 2500);
        }
    </script>
</body>
</html>

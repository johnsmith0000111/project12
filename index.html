<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Escape: Ultimate Smooth Edition! 🔥🏃‍♂️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background: #0f0c20;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Game Box with Smooth Rendering */
        #gameContainer {
            position: relative;
            width: 800px;
            height: 400px;
            background: linear-gradient(to bottom, #110724, #3a0d3d);
            border: 4px solid #ff4500;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255, 69, 0, 0.5);
            overflow: hidden;
            display: none;
        }

        /* Floor with Neon Line */
        #floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to top, #0f0f1a, #222);
            border-top: 4px solid #00ffff;
            box-shadow: 0 -5px 20px rgba(0, 255, 255, 0.6);
        }

        /* Ultra Smooth Glowing Character */
        #player {
            position: absolute;
            bottom: 40px; /* Floor height */
            left: 80px;
            width: 42px;
            height: 52px;
            background: linear-gradient(45deg, #00ffff, #0066ff);
            border-radius: 8px;
            box-shadow: 0 0 20px #00ffff;
            /* Remove inline css transitions to avoid physics stutter */
        }

        /* High-Definition Fireball Obstacle */
        #obstacle {
            position: absolute;
            bottom: 40px;
            left: 850px; /* Hidden initially off-screen right */
            width: 36px;
            height: 36px;
            background: radial-gradient(circle, #ffea00 10%, #ff4500 50%, #b30000 100%);
            border-radius: 50%;
            box-shadow: 0 0 30px #ff4500, 0 0 10px #ffea00;
        }

        /* Score Display HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 25px;
            right: 25px;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 3px 6px rgba(0,0,0,0.9);
            z-index: 5;
        }

        #scoreBox { color: #00ffff; }
        #highScoreBox { color: #ffea00; }

        /* Menu & Game Over Cards */
        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 8, 24, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #mainMenu {
            width: 480px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 55px rgba(0,0,0,0.6);
        }

        h1 {
            color: #fff;
            font-size: 36px;
            margin-bottom: 12px;
            text-shadow: 0 0 15px #ff4500;
            letter-spacing: 2px;
        }

        p {
            color: #ccc;
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn {
            background: linear-gradient(45deg, #ff4500, #ff8c00);
            color: white;
            border: none;
            padding: 15px 45px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 22px rgba(255, 69, 0, 0.45);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.06) translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.65);
        }

        #gameOverScreen {
            display: none;
            background: rgba(20, 0, 0, 0.85);
        }

        #gameOverScreen h1 {
            color: #ff2222;
            font-size: 48px;
            text-shadow: 0 0 25px rgba(255, 0, 0, 0.7);
            animation: pulse 0.8s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.98); }
            100% { transform: scale(1.04); }
        }
    </style>
</head>
<body>

    <!-- Audio Elements Setup -->
    <audio id="bgMusic" src="mk.mp3" loop preload="auto"></audio>
    <audio id="dieMusic" src="aag.mp3" preload="auto"></audio>

    <!-- 1. Initial Main Menu -->
    <div id="mainMenu">
        <h1>FIRE ESCAPE 🔥</h1>
        <p>Press <b>UP ARROW (↑)</b>, <b>SPACEBAR</b> or tap screen to jump and dodge the roaring fireballs!</p>
        <button class="btn" onclick="startGame()">START GAME 🕹️</button>
    </div>

    <!-- 2. Smooth Game Frame Window -->
    <div id="gameContainer" onclick="triggerJump()">
        <div id="hud">
            <div id="scoreBox">SCORE: <span id="score">0</span></div>
            <div id="highScoreBox">HI-SCORE: <span id="highScore">0</span></div>
        </div>

        <div id="player"></div>
        <div id="obstacle"></div>
        <div id="floor"></div>

        <!-- Game Over UI Card -->
        <div id="gameOverScreen" class="screen-overlay">
            <h1>YOU GOT ROASTED! 💀</h1>
            <p style="margin-top:10px; font-size:20px; color:#fff;">Final Score: <span id="finalScore" style="color:#ffea00; font-weight:900;">0</span></p>
            <button class="btn" onclick="restartGame()" style="margin-top: 20px;">TRY AGAIN 🔄</button>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('gameContainer');
        const mainMenu = document.getElementById('mainMenu');
        const player = document.getElementById('player');
        const obstacle = document.getElementById('obstacle');
        const scoreDisplay = document.getElementById('score');
        const finalScoreDisplay = document.getElementById('finalScore');
        const highScoreDisplay = document.getElementById('highScore');
        const gameOverScreen = document.getElementById('gameOverScreen');

        // Audio Objects
        const bgMusic = document.getElementById('bgMusic');
        const dieMusic = document.getElementById('dieMusic');

        // Core Engine Control Parameters
        let score = 0;
        let highScore = 0;
        let isGameOver = false;
        let animationFrameId;

        // Obstacle Vector Values
        let obstacleX = 850;
        let baseSpeed = 6.5;
        let currentSpeed = baseSpeed;

        // Player Real-time Physics Properties
        const floorY = 40; // Pixels from bottom boundary
        let playerY = floorY;
        let velocityY = 0;
        const gravityValue = 0.6; // Heavy smooth fall force
        const jumpForce = 13;     // High responsive jump force
        let isGrounded = true;

        // Event Listeners for Multi-control Support (Arrow Up + Space)
        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowUp' || event.key === ' ' || event.code === 'Space') {
                event.preventDefault(); // Stop webpage scrolling
                triggerJump();
            }
        });

        function startGame() {
            mainMenu.style.display = 'none';
            gameContainer.style.display = 'block';
            resetGameEngine();
        }

        function triggerJump() {
            if (isGrounded && !isGameOver) {
                velocityY = jumpForce;
                isGrounded = false;
            }
        }

        function resetGameEngine() {
            score = 0;
            currentSpeed = baseSpeed;
            obstacleX = 850;
            playerY = floorY;
            velocityY = 0;
            isGrounded = true;
            isGameOver = false;

            scoreDisplay.innerText = score;
            gameOverScreen.style.display = 'none';
            player.style.bottom = playerY + 'px';
            obstacle.style.left = obstacleX + 'px';

            // Audio track toggling safely
            dieMusic.pause();
            dieMusic.currentTime = 0;
            bgMusic.currentTime = 0;
            bgMusic.play().catch(e => console.log("Audio trigger waiting for user interaction context"));

            // RequestAnimationFrame for ultra-smooth 60fps refresh rates
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            animationFrameId = requestAnimationFrame(gameLoopUpdate);
        }

        // Main 60FPS Game Execution Loop 
        function gameLoopUpdate() {
            if (isGameOver) return;

            // 1. Apply Physics Math to Player Movement
            if (!isGrounded) {
                velocityY -= gravityValue; // pull down
                playerY += velocityY;      // apply velocity vector

                // Floor boundary validation check
                if (playerY <= floorY) {
                    playerY = floorY;
                    velocityY = 0;
                    isGrounded = true;
                }
                player.style.bottom = playerY + 'px';
            }

            // 2. Obstacle Translation Linear Movement
            obstacleX -= currentSpeed;
            // Screen boundaries check
            if (obstacleX < -50) {
                obstacleX = 850; // Reset off-screen right
                score += 10;
                scoreDisplay.innerText = score;

                // Scale difficulty speed smoothly every 20 points
                if (score % 20 === 0 && currentSpeed < 16) {
                    currentSpeed += 0.8;
                }
            }
            obstacle.style.left = obstacleX + 'px';

            // 3. High Precision Collision Check Collision Matrix
            // Player Box Coordinates
            let pLeft = 80;
            let pRight = 122; // left + width
            let pBottom = playerY;
            let pTop = playerY + 52; // bottom + height

            // Obstacle Box Coordinates
            let oLeft = obstacleX;
            let oRight = obstacleX + 36; // position + width
            let oTop = floorY + 36;      // floor baseline height + fireball height

            // Overlap verification logic
            if (oLeft < pRight && oRight > pLeft && pBottom < oTop) {
                triggerGameOver();
                return;
            }

            // Loop to next vertical sync frame smoothly
            animationFrameId = requestAnimationFrame(gameLoopUpdate);
        }

        function triggerGameOver() {
            isGameOver = true;
            cancelAnimationFrame(animationFrameId);

            // Audio Swap 
            bgMusic.pause();
            dieMusic.play().catch(e => console.log("Audio trigger context issue"));

            // Score evaluation
            if (score > highScore) {
                highScore = score;
                highScoreDisplay.innerText = highScore;
            }

            finalScoreDisplay.innerText = score;
            gameOverScreen.style.display = 'flex';
        }

        function restartGame() {
            resetGameEngine();
        }
    </script>
</body>
</html>
